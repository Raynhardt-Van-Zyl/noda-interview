name: Build mdBook

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mdBook
        run: cargo install mdbook --version 0.5.2 --locked

      - name: Build book
        run: mdbook build docs

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdbook
          path: docs/book
